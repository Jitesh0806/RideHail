version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ridehail-postgres
    environment:
      POSTGRES_USER: ridehail
      POSTGRES_PASSWORD: ridehail_password
      POSTGRES_DB: ridehail_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridehail -d ridehail_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ridehail-network

  # ─── Redis (ElastiCache equivalent locally) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ridehail-redis
    command: redis-server --requirepass ridehail_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ridehail-network

  # ─── Backend API ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: ridehail-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ridehail
      DB_PASSWORD: ridehail_password
      DB_NAME: ridehail_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ridehail_redis_password
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-ridehail-storage}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID:-}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID:-}
      SNS_PLATFORM_APPLICATION_ARN: ${SNS_PLATFORM_APPLICATION_ARN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ridehail-network
    volumes:
      - ./backend/logs:/app/logs

  # ─── Admin Panel ───────────────────────────────────────────────────────────
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: ridehail-admin
    environment:
      REACT_APP_API_URL: http://backend:3000/api/v1
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - ridehail-network

  # ─── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ridehail-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - admin
    networks:
      - ridehail-network

volumes:
  postgres_data:
  redis_data:

networks:
  ridehail-network:
    driver: bridge
